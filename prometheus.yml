# Prometheus Configuration pour Medical RAG Assistant

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'medical-rag-monitor'

# Alertmanager configuration (optionnel pour production)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "alert_rules.yml"

scrape_configs:
  # API RAG FastAPI
  - job_name: 'rag_api'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'rag-api'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # MLflow Tracking
  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']
        labels:
          service: 'mlflow'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 30s

  # ChromaDB Vector Database
  - job_name: 'chromadb'
    static_configs:
      - targets: ['chromadb:8001']
        labels:
          service: 'vector-db'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # PostgreSQL Database (via exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
        labels:
          service: 'postgres'
          environment: 'production'
    scrape_interval: 15s

  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']