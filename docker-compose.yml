version: '3.9'

name: medical-rag-assistant

# Day 1 Simplified Docker Compose for Infrastructure Testing
# This version removes complex dependencies for initial connectivity testing
# Full services will be enabled as we implement them in Days 2-5

services:
  # SERVICE 1: PostgreSQL Database (Core metadata storage)
  postgres:
    image: postgres:15-alpine
    container_name: medical_rag_postgres
    environment:
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: medical_pass123
      POSTGRES_DB: medical_rag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - medical_rag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SERVICE 2: Chroma Vector Database (Simplified - no auth for Day 1)
  chromadb:
    image: chromadb/chroma:latest
    container_name: medical_rag_chromadb
    environment:
      - ANONYMIZED_TELEMETRY=False
      - ALLOW_RESET=TRUE
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - medical_rag_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # SERVICE 3: FastAPI Backend (Simplified dependencies for Day 1)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_rag_api
    environment:
      - DATABASE_URL=postgresql://medical_user:medical_pass123@postgres:5432/medical_rag_db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - medical_rag_network
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # SERVICE 4: Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: medical_rag_frontend
    environment:
      - API_BASE_URL=http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./src/frontend:/app/src/frontend
    depends_on:
      api:
        condition: service_healthy
    networks:
      - medical_rag_network
    command: streamlit run src/frontend/app.py --server.address=0.0.0.0 --server.port=8501

  # SERVICES 5-6 (Ollama & MLflow) - ENABLED ON DAYS 4-5
  # Commented out for Day 1 - will be enabled as implementation progresses
  # ollama:
  #   image: ollama/ollama:latest
