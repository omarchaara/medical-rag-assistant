  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - medical_rag_network
  #   environment:
  #     - OLLAMA_KEEP_ALIVE=-1
  #   command: serve
  # 
  # mlflow:
  #   image: ghcr.io/mlflow/mlflow:v2.7.1
  #   container_name: medical_rag_mlflow
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - mlflow_data:/mlflow
  #   networks:
  #     - medical_rag_network
  #   command: mlflow server --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0

volumes:
