# Docker Compose pour Monitoring Medical RAG Assistant

version: '3.8'

services:
  # Prometheus - Scraping des métriques
  prometheus:
    image: prom/prometheus:latest
    container_name: rag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - rag-monitoring
    restart: unless-stopped

  # Grafana - Visualisation des métriques
  grafana:
    image: grafana/grafana:latest
    container_name: rag-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - rag-monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  # PostgreSQL Exporter - Métriques PostgreSQL
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: rag-postgres-exporter
    environment:
      - DATA_SOURCE_NAME="postgresql://medical_user:medical_pass@postgres:5432/medical_rag?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - rag-monitoring
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  rag-monitoring:
    driver: bridge
